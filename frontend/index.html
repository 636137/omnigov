<!DOCTYPE html>
<html>
<head>
  <title>OmniGov - Omnichannel Experience</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 50px auto; padding: 20px; }
    .channels { display: flex; gap: 20px; margin: 20px 0; }
    .channel { flex: 1; padding: 20px; border: 2px solid #ccc; border-radius: 8px; cursor: pointer; }
    .channel.active { border-color: #005ea2; background: #e3f2fd; }
    .channel h3 { margin: 0 0 10px; }
    input, select { width: 100%; padding: 10px; margin: 5px 0; }
    button { background: #005ea2; color: white; padding: 12px 24px; border: none; cursor: pointer; margin: 5px; }
    .history { margin-top: 30px; padding: 20px; background: #f5f5f5; }
    .history-item { padding: 10px; margin: 5px 0; background: white; border-left: 4px solid #005ea2; }
  </style>
</head>
<body>
  <h1>🌐 OmniGov</h1>
  <p>Seamless experience across all channels</p>
  
  <div>
    <label>User ID:</label>
    <input type="text" id="userId" placeholder="Enter your ID (e.g., user123)">
  </div>
  
  <h2>Select Channel</h2>
  <div class="channels">
    <div class="channel" onclick="selectChannel('web')">
      <h3>💻 Web</h3>
      <p>Desktop browser</p>
    </div>
    <div class="channel" onclick="selectChannel('mobile')">
      <h3>📱 Mobile</h3>
      <p>Mobile app</p>
    </div>
    <div class="channel" onclick="selectChannel('phone')">
      <h3>☎️ Phone</h3>
      <p>Call center</p>
    </div>
    <div class="channel" onclick="selectChannel('office')">
      <h3>🏢 Office</h3>
      <p>In-person</p>
    </div>
  </div>
  
  <div id="actionForm" style="display: none;">
    <h3>What would you like to do?</h3>
    <select id="action">
      <option value="apply">Apply for service</option>
      <option value="renew">Renew document</option>
      <option value="inquiry">Make inquiry</option>
      <option value="payment">Make payment</option>
    </select>
    <button onclick="startAction()">Start</button>
    <button onclick="checkResume()">Resume Previous</button>
  </div>
  
  <div id="history" class="history" style="display: none;"></div>
  
  <script>
    let currentChannel = null;
    
    function selectChannel(channel) {
      currentChannel = channel;
      document.querySelectorAll('.channel').forEach(c => c.classList.remove('active'));
      event.target.closest('.channel').classList.add('active');
      document.getElementById('actionForm').style.display = 'block';
    }
    
    async function startAction() {
      const userId = document.getElementById('userId').value;
      const action = document.getElementById('action').value;
      
      if (!userId) {
        alert('Please enter User ID');
        return;
      }
      
      const res = await fetch('http://localhost:3006/api/session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          userId,
          channel: currentChannel,
          action,
          data: { status: 'started' }
        })
      });
      
      const session = await res.json();
      alert(`Started ${action} on ${currentChannel}. Session ID: ${session.id}`);
      loadHistory(userId);
    }
    
    async function checkResume() {
      const userId = document.getElementById('userId').value;
      if (!userId) {
        alert('Please enter User ID');
        return;
      }
      
      const res = await fetch('http://localhost:3006/api/resume', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, newChannel: currentChannel })
      });
      
      const data = await res.json();
      if (data.canResume) {
        alert(data.message);
      } else {
        alert('No previous session found');
      }
    }
    
    async function loadHistory(userId) {
      const res = await fetch(`http://localhost:3006/api/session/${userId}`);
      const sessions = await res.json();
      
      const div = document.getElementById('history');
      let html = '<h3>Your Journey History</h3>';
      sessions.forEach(s => {
        html += `
          <div class="history-item">
            <strong>${s.action}</strong> via ${s.channel} 
            <small>(${new Date(s.timestamp).toLocaleString()})</small>
          </div>
        `;
      });
      div.innerHTML = html;
      div.style.display = 'block';
    }
  </script>
</body>
</html>
